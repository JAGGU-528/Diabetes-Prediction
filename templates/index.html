<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diabetes Predictor</title>
    <style>
        /* Basic styling — center everything */
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        /* Each input field group */
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        /* Predict button */
        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        /* Result display box */
        #result {
            margin-top: 20px;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border-radius: 5px;
            display: none; /* hidden until prediction comes */
        }
        .diabetic {
            background-color: #ffcccc;
            color: #cc0000;
        }
        .healthy {
            background-color: #ccffcc;
            color: #006600;
        }
    </style>
</head>
<body>

    <h1>🩺 Diabetes Prediction</h1>
    <p style="text-align:center; color:#777;">
        Enter patient details below to predict diabetes risk
    </p>

    <!-- Input form — 8 fields matching our model's features -->
    <div class="form-group">
        <label>Pregnancies</label>
        <input type="number" id="Pregnancies" placeholder="e.g. 6" min="0" max="20">
    </div>

    <div class="form-group">
        <label>Glucose Level</label>
        <input type="number" id="Glucose" placeholder="e.g. 148" min="50" max="250">
    </div>

    <div class="form-group">
        <label>Blood Pressure</label>
        <input type="number" id="BloodPressure" placeholder="e.g. 72" min="30" max="150">
    </div>

    <div class="form-group">
        <label>Skin Thickness</label>
        <input type="number" id="SkinThickness" placeholder="e.g. 35" min="0" max="100">
    </div>

    <div class="form-group">
        <label>Insulin</label>
        <input type="number" id="Insulin" placeholder="e.g. 0" min="0" max="900">
    </div>

    <div class="form-group">
        <label>BMI</label>
        <input type="number" id="BMI" placeholder="e.g. 33.6" min="10" max="70" step="0.1">
    </div>

    <div class="form-group">
        <label>Diabetes Pedigree Function</label>
        <input type="number" id="DiabetesPedigreeFunction" 
               placeholder="e.g. 0.627" min="0.05" max="2.5" step="0.001">
    </div>

    <div class="form-group">
        <label>Age</label>
        <input type="number" id="Age" placeholder="e.g. 25" min="1" max="120">
    </div>

    <!-- Predict button — calls predict() function -->
    <button onclick="predict()">🔍 Predict</button>

    <!-- Result box — hidden initially, shown after prediction -->
    <div id="result"></div>

    <script>
        async function predict() {
            // Step 1: Collect all 8 input values
            const data = {
                Pregnancies: parseFloat(document.getElementById('Pregnancies').value),
                Glucose: parseFloat(document.getElementById('Glucose').value),
                BloodPressure: parseFloat(document.getElementById('BloodPressure').value),
                SkinThickness: parseFloat(document.getElementById('SkinThickness').value),
                Insulin: parseFloat(document.getElementById('Insulin').value),
                BMI: parseFloat(document.getElementById('BMI').value),
                DiabetesPedigreeFunction: parseFloat(document.getElementById('DiabetesPedigreeFunction').value),
                Age: parseFloat(document.getElementById('Age').value)
            };
        
            // Step 2: Check if ANY field is empty
            const fieldNames = Object.keys(data);
            for (let field of fieldNames) {
                if (isNaN(data[field])) {
                    alert(`⚠️ Please fill in the "${field}" field!`);
                    return; // STOP — don't send to Flask
                }
            }

            // After the empty field check — add this:
            if (data.Pregnancies < 0 || data.Pregnancies > 20) {
                alert("Pregnancies must be between 0 and 20!"); return; }
            if (data.Glucose < 50 || data.Glucose > 250) {
                alert("Glucose must be between 50 and 250!"); return; }
            if (data.BloodPressure < 30 || data.BloodPressure > 150) {
                alert("Blood Pressure must be between 30 and 150!"); return; }
            if (data.SkinThickness < 0 || data.SkinThickness > 100) {
                alert("Skin Thickness must be between 0 and 100!"); return; }
            if (data.Insulin < 0 || data.Insulin > 900) {
                alert("Insulin must be between 0 and 900!"); return; }
            if (data.BMI < 10 || data.BMI > 70) {
                alert("BMI must be between 10 and 70!"); return; }
            if (data.DiabetesPedigreeFunction < 0.05 || data.DiabetesPedigreeFunction > 2.5) {
                alert("Diabetes Pedigree Function must be between 0.05 and 2.5!"); return; }
            if (data.Age < 1 || data.Age > 120) {
                alert("Age must be between 1 and 120!"); return; }
        
            // Step 3: Send to Flask /predict as POST request
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
        
            // Step 4: Get JSON response from Flask
            const result = await response.json();
        
            // Step 5: Show result on screen
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
        
            if (result.prediction === 'Has Diabetes') {
                resultDiv.className = 'diabetic';
                resultDiv.innerText = '⚠️ ' + result.prediction;
            } else {
                resultDiv.className = 'healthy';
                resultDiv.innerText = '✅ ' + result.prediction;
            }
        }
    </script>

</body>
</html>
